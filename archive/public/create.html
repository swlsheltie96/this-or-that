<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="style.css" />
    <link rel="stylesheet" type="text/css" href="create.css" />

    <title>This or That</title>
  </head>

  <body>
    <div class="home-small">
      <a href="/" class="flex align">
        <h5 class="index-title">THIS OR THAT</h5>
      </a>
    </div>

    <div class="flex center top">
      <h1 class="createTop">Create New List</h1>
    </div>
    <button id="cancelButton" class="clickable">
      <a href="/"><p>Cancel</p></a>
    </button>
    <hr />
    <div class="createForm wrapper box">
      <form id="createListForm">
        <div class="createForm-inner form">
          <div class="data name">
            <label for="listName">Title</label>
            <input type="text" id="listName" name="listName" required />
          </div>
          <div class="data author">
            <label for="author">Author</label>
            <input type="text" id="author" name="author" />
          </div>
          <div class="data password">
            <label for="password">Password</label>
            <input type="text" id="password" name="password" required />
          </div>
          <div class="data description">
            <label for="description">Description</label>
            <input type="text" id="description" name="description" />
          </div>
          <div class="data prompt">
            <label for="prompt">Vote prompt</label>
            <input type="text" id="prompt" name="prompt" required />
          </div>
        </div>
        <div class="actionButtons">
          <button id="submitButton" class="clickable">
            <p>Create List</p>
          </button>
        </div>
      </form>
    </div>

    <script src="api.js"></script>
    <script>
      document.getElementById("createListForm").addEventListener("submit", function (event) {
        event.preventDefault();

        // Get the values from the form
        const listName = document.getElementById("listName").value;
        const author = document.getElementById("author").value;

        const description = document.getElementById("description").value;
        const vote_prompt = document.getElementById("prompt").value;
        const password = document.getElementById("password").value;

        // You can perform further validation here if needed

        // Create a new "thing" object with the form data
        createList(
          listName,
          { description: description, prompt: vote_prompt, author: author },
          password
        ).then((resp) => {
          if (resp.error) {
            alert(resp.error);
          }
          cookieManager.setCookie(listName, password, {
            expires: new Date(Date.now() + 86400 * 1000),
            path: "/",
          });
          window.location.href = `/list.html?listName=${encodeURIComponent(listName)}`;
        });

        // Reset the form
        document.getElementById("createListForm").reset();
      });
    </script>
  </body>
</html>
