<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="style.css" />

    <title>Elo Chamber</title>
  </head>

  <body>
    <div id="createList">

    <form id="createListForm">
        <label for="listName">Title:</label>
        <input type="text" id="listName" name="listName" required><br><br>

        <label for="password">Password:</label>
        <input type="text" id="password" name="password" required><br><br>

        <label for="description">Description:</label>
        <textarea id="description" name="description"></textarea><br><br>

        <label for="prompt">Vote prompt:</label>
        <input type="prompt" id="prompt" name="prompt" required><br><br>

        <input type="submit" value="Create List">
    </form>

    </div>
    <script src="api.js"></script>
    <script>
        document.getElementById("createListForm").addEventListener("submit", function(event) {
            event.preventDefault();

            // Get the values from the form
            const listName = document.getElementById("listName").value;
            const description = document.getElementById("description").value;
            const vote_prompt = document.getElementById("prompt").value;
            const password = document.getElementById("password").value;

            // You can perform further validation here if needed

            // Create a new "thing" object with the form data
            createList(listName, {description: description, prompt: vote_prompt}, password).then((resp) => {
                if (resp.error) {
                  alert(resp.error);
                }
                cookieManager.setCookie(listName, password, { expires: new Date(Date.now() + 86400 * 1000), path: '/' });
                window.location.href = `/list.html?listName=${encodeURIComponent(listName)}`
            });

            // Reset the form
            document.getElementById("createListForm").reset();
        });
    </script>
  </body>
</html>
