<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="style.css" />

    <title>Elo Chamber</title>
  </head>

  <body>
    <div id="createList">

    <form id="createListForm">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required><br><br>

        <label for="description">Description:</label>
        <textarea id="description" name="description" required></textarea><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>

        <input type="submit" value="Create List">
    </form>

    </div>
    <script src="api.js"></script>
    <script>
        document.getElementById("createListForm").addEventListener("submit", function(event) {
            event.preventDefault();

            // Get the values from the form
            const title = document.getElementById("title").value;
            const description = document.getElementById("description").value;
            const password = document.getElementById("password").value;

            // You can perform further validation here if needed

            // Create a new "thing" object with the form data
            const newList = {
                title: title,
                description: description,
                password: password
            };
            createList(title, {description: description}, password).then((resp) => {
                if (resp.error) {
                  alert(resp.error);
                }
                window.location.href = `/list.html?listName=${encodeURIComponent(title)}`
            });

            // Reset the form
            document.getElementById("createListForm").reset();
        });
    </script>
  </body>
</html>
