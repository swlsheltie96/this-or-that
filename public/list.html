<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="style.css" />

    <link
      href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" type="text/css" href="list.css" />
    <title>List</title>

    <script
      type="text/javascript"
      src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"
    ></script>
  </head>
  <body>
    <div class="flex-justify top">
      <a href="https://elochamber.com/">
        <img
          class="elo-logo"
          src="https://win98icons.alexmeub.com/icons/png/cardfile-1.png"
        />
      </a>
      <h1 class="index-title">Elo Chamber</h1>
    </div>

    <div class="top">
      <div class="flex-justify listTop">
        <div class="data name">
          <label for="listName">Title</label>
          <input type="text" id="listName" name="listName" />
        </div>

        <a id="voteButton" class="clickable"><b>Vote!</b></a>
      </div>
      <div class="data description">
        <label for="description">Description</label>
        <input type="text" id="listDescription" name="description" />
      </div>

      <div class="data prompt">
        <label for="prompt">Voting prompt</label>
        <input type="text" id="listPrompt" name="prompt" />
      </div>
    </div>
    <div class="flex-justify">
      <a class="saveButton">[Save]</a>
      <a id="viewButton" class="clickable">Back to list</a>
    </div>

    <div class="elo-page">
      <div class="listContainer" id="listContainer"></div>

      <div class="flex-justify">
        <a id="addItemButton">+ (Add item)</a>
        <a class="saveButton">[Save]</a>
      </div>
    </div>

    <script src="api.js"></script>
    <script src="list.js"></script>
  </body>
</html>
