<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="style.css">

    <title>List</title>
    <style>
      .listData {
        text-align: center;
        font-weight: normal;
      }
      h1.listName {
        font-weight: normal;
        font-size: 12px;
      }
      .listitem {
        border: 1px solid #ccc;
        padding: 10px;
        margin: 5px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      #voteButton {
        /* width: 100%; */
        display: block;
        margin: 0 auto 1em auto;
        cursor: pointer;
      }
      #backButton {
        float: left;
      }
      img {
        max-width: 40px;
        aspect-ratio: 1;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <div class="listData">
      <a id="backButton">←</a><h1 id="listName"></h1>
    </div>
    <!-- Added button for voting -->

   <table id="listTable">
      <thead>
        <tr>
          <th>Rank</th>
          <th>Item</th>
          <th>Elo</th>
          <th>Picture</th>
        </tr>
      </thead>
      <tbody id="listContainer"></tbody>
    </table>
    <a id="voteButton">Vote</a>

    <script>
      // Create and append div elements for each Pokémon in descending order
      function makeList(data, listname, listBody) {
        let listTitle = document.getElementById("listName");
        listTitle.textContent = listname;

        let hasImage = false; // Initialize the flag

        data.forEach((element, index) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${index + 1}</td>
            <td>${element.name || ''}</td>
            <td>${element.elo || ''}</td>
          `;

          const rowData = element.data ? JSON.parse(element.data) : {};

          if (rowData.image) {
            const imageCell = document.createElement("td");
            const image = document.createElement("img");
            image.src = rowData.image;
            imageCell.appendChild(image);
            row.appendChild(imageCell);

            hasImage = true; // Set the flag to true if an image exists
          } else {
            row.innerHTML += `<td></td>`;
          }

          listBody.appendChild(row);
        });

        // Remove the "Picture" column if no items have an image
        if (!hasImage) {
          const tableHeader = document.querySelector("#listTable thead tr");
          const pictureHeader = tableHeader.querySelector("th:nth-child(4)");
          pictureHeader.style.display = "none";

          const tableRows = document.querySelectorAll("#listTable tbody tr");
          tableRows.forEach((row) => {
            const pictureCell = row.querySelector("td:nth-child(4)");
            pictureCell.style.display = "none";
          });
        }
      }



      window.addEventListener("load", async (event) => {
        // 1. Get the current URL
        const queryString = window.location.search;

        // Create a URLSearchParams object from the query string
        const searchParams = new URLSearchParams(queryString);

        // 3. Get the value of a specific query parameter
        const listName = searchParams.get(`listName`);
        // console.log(listName);

        const response = await fetch(
          `/get-sorted-list?listName=${encodeURIComponent(listName)}`
        );
        const data = await response.json();
        console.log(data);

        const listContainer = document.getElementById("listContainer");
        // Add event listener to the "Vote" button

        const backButton = document.getElementById("backButton");
        backButton.href = `index.html`;

        const voteButton = document.getElementById("voteButton");
        voteButton.addEventListener("click", () => {
          window.location.href = `vote.html?listName=${listName}`; // Redirect to the voting page
        });
        makeList(data.list, listName, listContainer);
      });
    </script>
  </body>
</html>
