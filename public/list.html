<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="style.css" />

    <link
      href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" type="text/css" href="list.css" />
    <title>List</title>

    <script
      type="text/javascript"
      src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"
    ></script>
  </head>
  <body>
    <div class="headerContent">
      <h1>Elo Chamber<span class="elo-logo"></span></h1>
    </div>

    <div class="elo-page">
      <h1 id="listTitle"></h1>
      <h2 id="listPrompt"></h2>

      <div class="flex-justify">
          <a id="voteButton">[Vote]</a>
          <a id="viewButton">[Grid View]</a>

        <a class="saveButton">[Save]</a>
      </div>

      <div class="listContainer" id="listContainer"></div>

      <div class="flex-justify">
        <a id="addItemButton">+ (Add item)</a>
        <a class="saveButton">[Save]</a>
      </div>
    </div>

    <script src="api.js"></script>
    <script src="list.js"></script>

    <form id="passwordEnterForm">
      <label for="password">Password:</label>
      <input
        type="password"
        id="password"
        name="password"
        required
      /><br /><br />

      <input type="submit" value="Submit" />
      <button type="button" id="cancel-button">Cancel</button>
    </form>
  </body>
</html>
