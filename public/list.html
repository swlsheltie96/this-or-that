<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="style.css" />
    <link
      href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator.min.css"
      rel="stylesheet"
    />
    <title>List</title>
    <style>
      .listSettings {
        display: flex;
        justify-content: space-between;
      }

      .headerContent {
        position: relative;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .edit,
      .delete,
      .save {
        display: none;
      }

      img {
        max-width: 40px;
        aspect-ratio: 1;
        object-fit: cover;
      }
      .listCell input {
        width: 100%;
        max-width: fit-content;
      }
    </style>

    <script
      type="text/javascript"
      src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"
    ></script>
  </head>
  <body>
    <div class="headerContent">
      <a id="backButton">←</a>
      <a href="index.html"><h5>Elo Chamber</h5></a>
    </div>
    <div class="listData">
      <h1 id="listName"></h1>
      <div class="listSettings">
        <div class="editList">
          <a id="editButton">Edit List</a>
          <button type="button" class="edit" id="addItemButtonTop">
            Add Item
          </button>

          <button type="button" class="edit" id="saveAllButtonTop">
            Save All
          </button>
        </div>
        <a id="voteButton">Vote</a>
      </div>
    </div>

    <div id="listTable">
      <div class="listRow listHeader">
        <div class="listCell delete">Delete</div>
        <div class="listCell save">Save</div>
        <div class="listCell">Rank</div>
        <div class="listCell">Item</div>
        <div class="listCell">Elo</div>
        <div class="listCell">Picture</div>
      </div>
      <div class="listContainer" id="listContainer"></div>
    </div>

    <button type="button" class="edit" id="addItemButton">Add Item</button>

    <button type="button" class="edit" id="saveAllButton">Save All</button>

    <div id="example-table"></div>
    <script src="list.js"></script>
    <!-- <script src="list-tabulator.js"></script> -->
  </body>
</html>
