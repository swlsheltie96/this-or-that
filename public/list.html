<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="style.css" />
    <link
      href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator.min.css"
      rel="stylesheet"
    />
    <title>List</title>
    <style>
      .listSettings {
        display: flex;
        justify-content: space-between;
      }

      .headerContent {
        position: relative;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .edit,
      .delete,
      .save {
        display: none;
      }

      img {
        max-width: 40px;
        aspect-ratio: 1;
        object-fit: cover;
      }
      .listCell input {
        width: 100%;
        max-width: fit-content;
      }
    </style>

    <script
      type="text/javascript"
      src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"
    ></script>
  </head>
  <body>
    <div class="headerContent">
      <a id="backButton" href="index.html">←</a>
      <a href="index.html"><h5>Elo Chamber</h5></a>
    </div>
    <br />
    <a id="voteButton">[vote]</a>
    <a id="viewButton">[Grid View]</a>
    <h1>List Title</h1>
    <div class="listSettings">
      <span></span>
      <a class="saveButton">[save]</a>
    </div>

    <div class="listContainer" id="listContainer"></div>

    <div class="listSettings">
      <a id="addItemButton">+</a>
      <a class="saveButton">[save]</a>
    </div>

    <script src="api.js"></script>

    <script src="list.js"></script>
  </body>
</html>
