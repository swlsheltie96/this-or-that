<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Pokémon List</title>
    <style>
      body {
        font-family: Helvetica, Arial, sans-serif;
        font-size: 12px;
        margin: 10em;
      }
      .listData {
        text-align: center;
        font-weight: normal;
      }
      h1.listName {
        font-weight: normal;
        font-size: 12px;
      }
      .listitem {
        border: 1px solid #ccc;
        padding: 10px;
        margin: 5px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      #voteButton {
        /* width: 100%; */
        display: block;
        margin: 0 auto 1em auto;

        font-size: 12px;
        color: #333;
        background-color: white;
        border: 1px black solid;
        padding: 5px 10px;
        border-radius: 25px;
        cursor: pointer;
      }
      img {
        max-width: 40px;
        aspect-ratio: 1;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <div class="listData">
      <h1 id="listName"></h1>
    </div>
    <button id="voteButton">Vote</button>
    <!-- Added button for voting -->

    <div id="listContainer"></div>

    <script>
      // Create and append div elements for each Pokémon in descending order

      function makeList(data, listname, listContainer) {
        let listTitle = document.getElementById("listName");
        listTitle.textContent = listname;
        data.forEach((element, index) => {
          // console.log(element.data["image"]);
          let data = JSON.parse(element.data);
          const elementDiv = document.createElement("div");
          elementDiv.className = "listitem";
          elementDiv.innerHTML = `
            <p>${index + 1}. ${element.name} - ${element.elo}</p>
          `;
          listContainer.appendChild(elementDiv);

          if (data.image) {
            const image = document.createElement("img");
            image.src = data.image;
            elementDiv.appendChild(image);
          }
        });
      }

      window.addEventListener("load", async (event) => {
        // 1. Get the current URL
        const queryString = window.location.search;

        // Create a URLSearchParams object from the query string
        const searchParams = new URLSearchParams(queryString);

        // 3. Get the value of a specific query parameter
        const listName = searchParams.get(`listName`);
        // console.log(listName);

        const response = await fetch(
          `/get-sorted-list?listName=${encodeURIComponent(listName)}`
        );
        const data = await response.json();
        console.log(data);

        const listContainer = document.getElementById("listContainer");
        // Add event listener to the "Vote" button

        const voteButton = document.getElementById("voteButton");
        voteButton.addEventListener("click", () => {
          window.location.href = `vote.html?listName=${listName}`; // Redirect to the voting page
        });
        makeList(data.list, listName, listContainer);
      });
    </script>
  </body>
</html>
