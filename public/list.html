<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="style.css" />

    <title>List</title>
    <style>
      .listData {
        text-align: center;
        font-weight: normal;
      }

      .listitem {
        border: 1px solid #ccc;
        padding: 10px;
        margin: 5px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .listSettings {
        display: flex;
        justify-content: space-between;
      }
      .headerContent {
        position: relative;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .edit {
        display: none;
      }
      img {
        max-width: 40px;
        aspect-ratio: 1;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <div class="headerContent">
      <a id="backButton">←</a>
      <a href="index.html"><h5>Elo Chamber</h5></a>
    </div>
    <div class="listData">
      <h1 id="listName"></h1>
      <div class="listSettings">
        <div class="editList">
          <a id="editButton">Edit List</a>
          <button type="button" class="edit add" id="addItemButtonTop">
            Add Item
          </button>

          <button type="button" class="edit save" id="saveAllButtonTop">
            Save All
          </button>
        </div>
        <a id="voteButton">Vote</a>
      </div>
    </div>
    <!-- Added button for voting -->

    <table id="listTable">
      <thead>
        <tr>
          <th>Rank</th>
          <th>Item</th>
          <th>Elo</th>
          <th>Picture</th>
        </tr>
      </thead>
      <tbody id="listContainer"></tbody>
    </table>

    <button type="button" class="edit add" id="addItemButton">Add Item</button>

    <button type="button" class="edit save" id="saveAllButton">Save All</button>

    <script>
      function saveAll(listname, listbody) {
        console.log(listname);
        const fetchPromises = [];
        listbody.querySelectorAll("tr").forEach((row) => {
          if (row.classList.contains("unsaved")) {
            let unsavedRow = {
              name: row.querySelector("#nameInput").value,
              picture: row.querySelector("#pictureInput").value,
            };

            const fetchPromise = fetch("/add-item", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                listName: listname,
                item: {
                  name: unsavedRow.name,
                  data: {
                    image: unsavedRow.picture,
                  },
                },
              }),
            })
              .then((response) => response.json())
              .then((data) => {
                if (data.error) {
                  console.error(data.error);
                } else {
                  console.log(data.message);
                  listbody.removeChild(row);
                }
              })
              .catch((error) => {
                console.error("Error:", error);
              });
            fetchPromises.push(fetchPromise);
          }
        });
        Promise.all(fetchPromises)
          .then(() => {
            // All fetch requests are done, now call getList
            getList(listname).then((data) => {
              makeList(data.list, listname, listbody);
            });
          })
          .catch((error) => {
            console.error("Error:", error);
          });
      }
      function saveAndReloadTable(listname, listbody) {
        // Save the unsaved rows
        console.log("reloading");
        const unsavedRows = [];
        listbody.querySelectorAll("tr").forEach((row) => {
          if (row.classList.contains("unsaved")) {
            // let name = unsavedRows.push(row.cloneNode(true));
            console.log(row);
            let unsavedRow = {
              name: row.querySelector("#nameInput").value,
              picture: row.querySelector("#pictureInput").value,
            };
            unsavedRows.push(unsavedRow);
            //instead of clone node, save the data
          }
        });

        getList(listname)
          .then((data) => {
            // Clear the existing table
            while (listbody.firstChild) {
              listbody.removeChild(listbody.firstChild);
            }

            // Rebuild the table with the updated data
            makeList(data.list, listname, listbody);

            // Add back the unsaved rows
            unsavedRows.forEach((row) => {
              // listbody.appendChild(row);
              addRow(listname, listbody, row.name, row.picture);
              //instead of appending clones, recreate the rows using below code
            });
          })
          .catch((error) => {
            console.error("Error fetching updated data:", error);
          });
      }

      async function getList(listname) {
        //### LOAD LIST
        const response = await fetch(
          `/get-sorted-list?listName=${encodeURIComponent(listname)}`
        );
        const data = await response.json();
        console.log(data);
        return data;
      }
      // Create and append div elements for each Pokémon in descending order
      function makeList(data, listname, listBody) {
        let listTitle = document.getElementById("listName");
        listTitle.textContent = listname;
        console.log(data);
        let hasImage = false; // Initialize the flag
        while (listBody.firstChild) {
          listBody.removeChild(listBody.firstChild);
        }

        data.forEach((element, index) => {
          const row = document.createElement("tr");
          row.innerHTML = `
                  <td>${index + 1}</td>
                  <td>${element.name || ""}</td>
                  <td>${element.elo || ""}</td>
                `;

          const rowData = element.data ? JSON.parse(element.data) : {};

          if (rowData.image) {
            const imageCell = document.createElement("td");
            const image = document.createElement("img");
            image.src = rowData.image;
            imageCell.appendChild(image);
            row.appendChild(imageCell);

            hasImage = true; // Set the flag to true if an image exists
          } else {
            row.innerHTML += `<td></td>`;
          }

          listBody.appendChild(row);
        });

        // Remove the "Picture" column if no items have an image
        if (!hasImage) {
          const tableHeader = document.querySelector("#listTable thead tr");
          const pictureHeader = tableHeader.querySelector("th:nth-child(4)");
          pictureHeader.style.display = "none";

          const tableRows = document.querySelectorAll("#listTable tbody tr");
          tableRows.forEach((row) => {
            const pictureCell = row.querySelector("td:nth-child(4)");
            pictureCell.style.display = "none";
          });
        }
      }

      function addRow(
        listName,
        listbody,
        unsavedName = "",
        unsavedPicture = ""
      ) {
        // Create a new table row element
        const newRow = document.createElement("tr");
        newRow.classList.add("unsaved");
        // Create and append the table cells and input elements
        const actionCell = document.createElement("td");
        const saveButton = document.createElement("button");
        saveButton.type = "button";
        saveButton.textContent = "Save";
        actionCell.appendChild(saveButton);

        const cancelButton = document.createElement("button");
        cancelButton.type = "button";
        cancelButton.textContent = "Cancel";
        actionCell.appendChild(cancelButton);

        newRow.appendChild(actionCell);

        const itemCell = document.createElement("td");
        const itemNameInput = document.createElement("input");
        itemNameInput.type = "text";
        itemNameInput.id = "nameInput";
        if (unsavedName !== "") {
          itemNameInput.value = unsavedName;
        } else {
          itemNameInput.placeholder = "Item Name";
        }
        itemCell.appendChild(itemNameInput);
        newRow.appendChild(itemCell);

        const eloCell = document.createElement("td");
        // const eloInput = document.createElement("input");
        // eloInput.type = "number";
        // eloInput.placeholder = "Elo";
        // eloCell.appendChild(eloInput);
        eloCell.textContent = "";
        newRow.appendChild(eloCell);

        const pictureCell = document.createElement("td");
        const pictureInput = document.createElement("input");
        pictureInput.id = "pictureInput";
        pictureInput.type = "text";
        if (unsavedPicture !== "") {
          pictureInput.value = unsavedPicture;
        } else {
          pictureInput.placeholder = "Picture URL";
        }
        pictureCell.appendChild(pictureInput);
        newRow.appendChild(pictureCell);

        // Append the new row to the list container
        listbody.appendChild(newRow);

        cancelButton.addEventListener("click", () => {
          listbody.removeChild(newRow); // Remove the row if canceled
        });

        saveButton.addEventListener("click", () => {
          //get password
          const passwordInput = document.getElementById("passwordInput");
          const inputtedPassword = passwordInput.value;

          // Handle saving the new item data here
          const newItemName = itemNameInput.value;
          // const newItemElo = eloInput.value;
          const newItemPicture = pictureInput.value;

          console.log("saving", newItemName, newItemPicture);
          // Send a POST request to the server to add the new item
          fetch("/add-item", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              listName: listName, // Replace with the actual list name
              item: {
                name: newItemName,
                data: {
                  image: newItemPicture,
                },
                password: inputtedPassword,
              },
            }),
          })
            .then((response) => response.json())
            .then((data) => {
              if (data.error) {
                // Handle errors, e.g., display an error message
                console.error(data.error);
              } else {
                // Item added successfully, you can update the UI as needed
                console.log(data.message);
                // newRow.style.display = "none"; // Hide the row after saving
                // // Optionally, update the UI to reflect the newly added item
                listbody.removeChild(newRow);
                saveAndReloadTable(listName, listbody);
              }
            })
            .catch((error) => {
              console.error("Error:", error);
            });
        });
      }

      window.addEventListener("load", async (event) => {
        const listContainer = document.getElementById("listContainer");

        //### GET LIST
        // 1. Get the current URL
        const queryString = window.location.search;
        // Create a URLSearchParams object from the query string
        const searchParams = new URLSearchParams(queryString);
        // 3. Get the value of a specific query parameter
        const listName = searchParams.get(`listName`);

        getList(listName).then((data) => {
          makeList(data.list, listName, listContainer);
        });

        // Add event listener to the "Vote" button and "Back" button
        const backButton = document.getElementById("backButton");
        backButton.href = `index.html`;
        const voteButton = document.getElementById("voteButton");
        voteButton.addEventListener("click", () => {
          window.location.href = `vote.html?listName=${listName}`; // Redirect to the voting page
        });

        // EDIT LIST BUTTON BECOMES PASSWORD BOX AND TRIGGERS ADD/SAVE BUTTONS
        const editButton = document.getElementById("editButton");
        const editList = document.querySelector(".editList");

        editButton.addEventListener("click", function () {
          // Create an input element
          const inputElement = document.createElement("input");
          inputElement.type = "text";
          inputElement.id = "passwordInput";
          inputElement.placeholder = "Input password here to edit the list"; // Set the initial value

          // Create an "Enter" button
          const enterButton = document.createElement("button");
          enterButton.textContent = "Enter";

          // Replace the "Edit List" button with the input and "Enter" button
          editList.replaceChild(inputElement, editButton);
          editList.appendChild(enterButton);

          // Add an event listener for the "Enter" button
          enterButton.addEventListener("click", function () {
            // Retrieve the entered value
            const password = inputElement.value;

            // Create a data object with the password and listName
            const data = {
              listName: listName,
              password: password,
            };

            // Send a POST request to the server
            fetch("/check-password", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify(data),
            })
              .then((response) => response.json())
              .then((data) => {
                // Handle the response from the server
                if (data.message) {
                  console.log(data.message); // Password is valid
                  let editButtons = document.querySelectorAll(".edit");

                  editButtons.forEach((el) => {
                    el.style.display = "inline";
                  });
                  inputElement.disabled = true;
                  enterButton.style.display = "none";
                } else if (data.error) {
                  console.error(data.error); // Invalid password or other errors
                  // Add your logic for an invalid password or error here
                }
              })
              .catch((error) => {
                console.error("Error:", error);
                // Handle network or server errors here
              });
          });
        });

        //### EDITING LIST: ADD NEW ROWS
        const addItemButton = document.getElementById("addItemButton");

        addItemButton.addEventListener("click", () => {
          addRow(listName, listContainer);
        });

        document
          .getElementById("addItemButtonTop")
          .addEventListener("click", function () {
            addRow(listName, listContainer);
            console.log("top");
            lastListItem = document.getElementById("listContainer");
            lastListItem.lastChild.scrollIntoView({ behavior: "smooth" });
          });
      });
      //// temp save all button
      const saveAllButton = document.getElementById("saveAllButton");
      const saveAllButtonTop = document.getElementById("saveAllButtonTop");

      saveAllButton.addEventListener("click", () => {
        saveAll(listName, listContainer);
      });

      saveAllButtonTop.addEventListener("click", () => {
        saveAll(listName, listContainer);
      });
    </script>
  </body>
</html>
