<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vote for Item</title>
    <style>
      body {
        font-family: Helvetica, Arial, sans-serif;
        font-size: 12px;
        margin: 10em;
        font-weight: normal;
      }
      h1,
      h2 {
        font-weight: normal;
        font-size: 12px;
        text-align: center;
      }
      #elementVoteContainer {
        display: flex;
      }
      .element {
        width: 50%;
        border: 1px solid #ccc;
        padding: 10px;
        margin: 5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="titleContainer">
      <a href="javascript:history.back();">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="31"
          height="8"
          viewBox="0 0 31 8"
          fill="none"
        >
          <path
            d="M0.646444 3.64645C0.451183 3.84171 0.451183 4.15829 0.646444 4.35355L3.82842 7.53553C4.02369 7.7308 4.34027 7.7308 4.53553 7.53553C4.73079 7.34027 4.73079 7.02369 4.53553 6.82843L1.70711 4L4.53553 1.17157C4.73079 0.976311 4.73079 0.659728 4.53553 0.464466C4.34027 0.269204 4.02369 0.269204 3.82842 0.464466L0.646444 3.64645ZM31 3.5L0.999998 3.5V4.5L31 4.5V3.5Z"
            fill="black"
          />
        </svg>
      </a>

      <h1>Vote for Your Favorite Pokémon</h1>
    </div>

    <div id="elementVoteContainer">
      <!-- The two random Pokémon will be displayed here -->
      <div class="element" id="element1">
        <!-- Pokémon 1 data goes here -->
        <h2 id="element1Name"></h2>
        <p id="element1Elo"></p>
      </div>
      <div class="element" id="element2">
        <!-- Pokémon 2 data goes here -->
        <h2 id="element2Name"></h2>
        <p id="element2Elo"></p>
      </div>
    </div>
    <script>
      // Create clickable Pokémon elements
      function createVote(list, data) {
        document.getElementById("element1Name").textContent = data.item1.name;
        document.getElementById("element2Name").textContent = data.item2.name;

        const element1Container = document.getElementById("element1");
        const element2Container = document.getElementById("element2");

        // Set up click event listeners
        element1Container.addEventListener("click", () => {
          handleVote(list, data.item1, data.item2);
        });

        element2Container.addEventListener("click", () => {
          handleVote(list, data.item2, data.item1);
        });
      }

      // Function to handle voting
      function handleVote(list, winner, loser) {
        vote(list, winner.name, loser.name);
        // Here you might want to update the UI or fetch new Pokémon for voting
        location.reload();
      }

      // Function to vote using the provided API
      async function vote(listName, winner, loser) {
        const response = await fetch("/vote", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            listName: listName,
            winner: winner,
            loser: loser,
          }),
        });
        const data = await response.json();
        console.log(data);
      }

      window.addEventListener("load", async (event) => {
        const queryString = window.location.search;

        // Create a URLSearchParams object from the query string
        const searchParams = new URLSearchParams(queryString);

        // 3. Get the value of a specific query parameter
        const listName = searchParams.get(`listName`);

        const response = await fetch(
          `/get-pair?listName=${encodeURIComponent(listName)}`
        );
        const data = await response.json();
        console.log(data);
        // displayElements(data);
        createVote(listName, data);
      });
    </script>
  </body>
</html>
