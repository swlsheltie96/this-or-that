<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="style.css" />
    <link rel="stylesheet" type="text/css" href="grid.css" />

    <link rel="stylesheet" type="text/css" href="vote.css" />

    <title>Vote for Item</title>
  </head>
  <body>
    <div class="home-small">
      <a href="https://elochamber.com/" class="flex align">
        <img
          class="elo-logo small"
          src="https://win98icons.alexmeub.com/icons/png/cardfile-1.png"
        />

        <h5 class="index-title">Elo Chamber</h5>
      </a>
    </div>
    <h1 id="listName" class="index-title"></h1>
    <h2 class="instructions">Click, tap, or use arrow keys</h2>
    <div class="listTop wrapper box">
      <div class="listTop-inner form">
        <p>Vote!</p>
        <h2 class="voteTitle" id="listPrompt"></h2>
      </div>
    </div>
    <hr />
    <div class="vote-wrapper box">
      <div id="elementVoteContainer">
        <div class="voteElement" id="element1">
          <div
            class="voteElementButton header box flex align voter huge clickable"
          ></div>

          <!-- <button class=""></button> -->
        </div>
        <div class="voteElement" id="element2">
          <div
            class="voteElementButton header box flex align voter huge clickable"
          ></div>

          <!-- <button class="voter huge clickable"></button> -->
        </div>
      </div>

      <div class="actionButtons">
        <button id="skipButton" class="clickable">
          <a id="skipButtonA"><p>skip</p></a>
        </button>

        <button id="resultsButton" class="clickable">
          <a id="resultsButtonA"><p>results</p></a>
        </button>
      </div>
    </div>

    <script src="api.js"></script>
    <script>
      // Create clickable elements
      function createVote(list, data) {
        console.log(data);
        const items = Object.keys(data);

        let voteBoxes = document.querySelectorAll(".voteElement");
        let voteBoxes_buttons = document.querySelectorAll(".voteElementButton");
        // let voteBoxes_images = document.querySelectorAll(".voteElementImage");
        items.forEach((el, i) => {
          const el_name = document.createElement("h4");
          el_name.textContent = data[el].name;
          voteBoxes_buttons[i].appendChild(el_name);
          if (data[el].data) {
            let parsedData = JSON.parse(data[el].data);
            console.log(parsedData);
            if (parsedData.picture) {
              const imageDiv = document.createElement("div");
              imageDiv.classList.add("voteElementImage", "box");
              const image = document.createElement("img");
              image.src = parsedData.picture;
              image.classList.add("inner-box");
              imageDiv.appendChild(image);
              voteBoxes[i].prepend(imageDiv);
            }
            if (parsedData.info) {
              const info = document.createElement("h2");
              info.textContent = parsedData.info;
              voteBoxes_headers[i].appendChild(info);
            }
          }
        });

        // document.getElementById("element1Name").textContent = data.item1.name;
        // document.getElementById("element2Name").textContent = data.item2.name;

        const element1Container = document.getElementById("element1");
        const element2Container = document.getElementById("element2");

        // Set up click event listeners
        element1Container.addEventListener("click", () => {
          handleVote(list, data.item1, data.item2);
        });

        element2Container.addEventListener("click", () => {
          handleVote(list, data.item2, data.item1);
        });
      }

      // Function to handle voting
      function handleVote(list, winner, loser) {
        vote(list, winner.name, loser.name);
        // Here you might want to update the UI or fetch new Pokémon for voting
        location.reload();
      }

      // Function to vote using the provided API
      async function vote(listName, winner, loser) {
        const response = await fetch("/vote", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            listName: listName,
            winner: winner,
            loser: loser,
          }),
        });
        const data = await response.json();
        console.log(data);
      }

      window.addEventListener("load", async (event) => {
        const queryString = window.location.search;

        // Create a URLSearchParams object from the query string
        const searchParams = new URLSearchParams(queryString);

        // 3. Get the value of a specific query parameter
        const listName = searchParams.get(`listName`);
        document.title = `${listName} 🗳️`;
        document.getElementById("listName").textContent = `${listName}`;
        document.getElementById(
          "resultsButtonA"
        ).href = `grid.html?listName=${listName}`;
        document.getElementById(
          "skipButtonA"
        ).href = `vote.html?listName=${listName}`;
        getListInfo(listName).then((d) => {
          document.getElementById("listPrompt").textContent =
            "Prompt: " + d.prompt;
        });

        const response = await fetch(
          `/get-pair?listName=${encodeURIComponent(listName)}`
        );
        const data = await response.json();
        console.log(data);
        // displayElements(data);
        createVote(listName, data);
      });
    </script>
  </body>
</html>
