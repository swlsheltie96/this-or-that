<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="style.css" />

    <title>Elo Chamber</title>
    <style>
      ul {
        list-style: none;
        padding: 0;
      }
      li {
        border: 1px solid #ccc;
        margin: 5px 0;
        padding: 10px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      li a {
        text-decoration: none;
        color: #333;
        cursor: pointer;
        font-size: 20px;
      }

      label {
        display: block;
        flex-grow: 1;
        padding-bottom: 5px;
        /* width: 15%; */
      }
      input {
        display: block;
        flex-grow: 3;
        font-size: 12px;
        padding: 10px;
        border-radius: 0;
        border: solid 1px #ccc;
        box-sizing: border-box;
        width: 100%;
      }
      img {
        width: 50px;
        aspect-ratio: 1 / 1;
      }
      #itemFields > div,
      #listTitle {
        margin: 1em 0;
        /* display: flex; */
      }
      .listData,
      .listActions {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .itemContainer {
        display: flex;
        gap: 10px;
        padding-top: 5px;
      }
      .itemName,
      .itemImage {
        width: 50%;
      }
      form {
        border: solid 1px #ccc;
        padding: 10px;
        margin-top: 20px;
        margin-bottom: 1em;
      }
      #addItemButton {
        margin-right: 0;
        margin-left: auto;
        display: block;
      }
      .onlineStatus {
        width: 10px;
        height: 10px;
        border-radius: 100px;
      }
      .online {
        background-color: lightgreen;
      }
    </style>
  </head>
  <body>
    <h1>Elo Chamber</h1>
    <ul id="listOfLists">
      <!-- Existing list items will be populated here -->
    </ul>
    <br />
    <a id="creatListInitButton" href="create.html">Create New List</a>

    <!-- JavaScript code to handle form submission and populate the list of lists -->
    <script>
      async function populateListOfLists() {
        const response = await fetch("/get-lists"); // Fetch the list of lists
        const data = await response.json();
        const listOfLists = document.getElementById("listOfLists");

        // Clear the existing list items
        listOfLists.innerHTML = "";

        // Populate the list of lists
        data.lists.forEach((list) => {
          console.log(data.lists);
          const listItem = document.createElement("li");

          const listData = document.createElement("div");
          const listActions = document.createElement("div");
          const listPreview = document.createElement("div");

          const listLink = document.createElement("a");
          const onlineStatus = document.createElement("div");
          const listImg = document.createElement("img");
          listImg.src =
            "https://www.sideshow.com/cdn-cgi/image/height=850,quality=90,f=auto/https://www.sideshow.com/storage/product-images/907125/poke-ball_pokemon_gallery_5fbe976c2f7a0.jpg";
          onlineStatus.classList.add("onlineStatus", "online");
          listLink.href = `list.html?listName=${list.name}`;
          listLink.textContent = list.name + " 🔥";
          listData.appendChild(listImg);
          listData.appendChild(listLink);
          listData.appendChild(onlineStatus);
          listData.appendChild(listPreview);
          listData.classList.add("listData");

          listActions.classList.add("listActions");

          listItem.appendChild(listData);

          const viewButton = document.createElement("button");
          const voteButton = document.createElement("button");
          viewButton.textContent = "view";
          voteButton.textContent = "vote";
          listActions.appendChild(viewButton);
          listActions.appendChild(voteButton);

          listItem.appendChild(listActions);

          listOfLists.appendChild(listItem);
        });
      }

      // Initial population of the list of lists
      populateListOfLists();
    </script>
  </body>
</html>
