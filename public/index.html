<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="style.css" />
    <link rel="stylesheet" type="text/css" href="index.css" />

    <title>Elo Chamber</title>
  </head>
  <body>
    <h1>Elo Chamber<span class="elo-logo"></span></h1>
    <a id="creatListInitButton" href="create.html">Create New List</a>

    <ul id="listOfLists">
      <!-- Existing list items will be populated here -->
    </ul>
    <br />

    <!-- JavaScript code to handle form submission and populate the list of lists -->
    <script src="api.js"></script>
    <script>
      async function populateListOfLists() {
        const response = await fetch("/get-lists"); // Fetch the list of lists
        const data = await response.json();
        const listOfLists = document.getElementById("listOfLists");

        // Clear the existing list items
        listOfLists.innerHTML = "";
        console.log("hi");
        // Populate the list of lists
        data.lists.forEach((list) => {
          console.log(data.lists);
          let horizontal_transform = Math.random() * (10 - -10) + -10;
          console.log(horizontal_transform);
          const listItem = document.createElement("li");
          listItem.style.transform =
            "translate(" + horizontal_transform + "px, 0px)";
          listItem.addEventListener("mouseenter", (e) => {
            listItem.classList.add("hover");
            listItem.style.transform =
              "translate(" + horizontal_transform + "px, -10px)";
          });
          listItem.addEventListener("mouseleave", (e) => {
            listItem.classList.remove("hover");
            listItem.style.transform =
              "translate(" + horizontal_transform + "px, 0px)";
          });
          const listData = document.createElement("div");
          const listActions = document.createElement("div");
          const listPreview = document.createElement("div");

          const listLink = document.createElement("a");
          const onlineStatus = document.createElement("div");
          const listImg = document.createElement("img");
          getSortedList(list.name).then((items) => {
            listImg.src = items[0].data.picture;
          });
          onlineStatus.classList.add("onlineStatus", "online");
          listLink.href = `grid.html?listName=${list.name}`;
          listLink.textContent = list.name + " 🔥";
          listData.appendChild(listImg);
          listData.appendChild(listLink);
          listData.appendChild(onlineStatus);
          listData.appendChild(listPreview);
          listData.classList.add("listData");

          listActions.classList.add("listActions");

          listItem.appendChild(listData);

          const viewButton = document.createElement("a");
          const voteButton = document.createElement("a");
          viewButton.textContent = "[View]";
          voteButton.textContent = "[Vote]";
          viewButton.href = `grid.html?listName=${list.name}`;
          voteButton.href = `vote.html?listName=${list.name}`;
          listActions.appendChild(viewButton);
          listActions.appendChild(voteButton);

          listItem.appendChild(listActions);

          listOfLists.appendChild(listItem);
        });
      }

      // Initial population of the list of lists
      populateListOfLists();
    </script>
  </body>
</html>
