<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="style.css" />

    <title>Elo Chamber?</title>
    <style>
      ul {
        list-style: none;
        padding: 0;
      }
      li {
        border: 1px solid #ccc;
        margin: 5px 0;
        padding: 10px;
        cursor: pointer;
      }
      li a {
        text-decoration: none;
        color: #333;
        cursor: pointer;
      }
      button,
      #submitNewList {
        font-size: 12px;
        color: #333;
        background-color: white;
        border: 1px black solid;
        padding: 5px 10px;
        border-radius: 25px;
        cursor: pointer;
      }

      label {
        display: block;
        flex-grow: 1;
        padding-bottom: 5px;
        /* width: 15%; */
      }
      input {
        display: block;
        flex-grow: 3;
        font-size: 12px;
        padding: 10px;
        border-radius: 0;
        border: solid 1px #ccc;
        box-sizing: border-box;
        width: 100%;
      }
      #itemFields > div,
      #listTitle {
        margin: 1em 0;
        /* display: flex; */
      }
      .itemContainer {
        display: flex;
        gap: 10px;
        padding-top: 5px;
      }
      .itemName,
      .itemImage {
        width: 50%;
      }
      form {
        border: solid 1px #ccc;
        padding: 10px;
        margin-top: 20px;
        margin-bottom: 1em;
      }
      #addItemButton {
        margin-right: 0;
        margin-left: auto;
        display: block;
      }
    </style>
  </head>
  <body>
    <h1>Elo Chamber</h1>
    <ul id="listOfLists">
      <!-- Existing list items will be populated here -->
    </ul>
    <br />
    <a id="creatListInitButton" href="create.html">Create New List</a>

    <!-- JavaScript code to handle form submission and populate the list of lists -->
    <script>
      async function populateListOfLists() {
        const response = await fetch("/get-lists"); // Fetch the list of lists
        const data = await response.json();
        const listOfLists = document.getElementById("listOfLists");

        // Clear the existing list items
        listOfLists.innerHTML = "";

        // Populate the list of lists
        data.lists.forEach((list) => {
          console.log(data.lists);
          const listItem = document.createElement("li");
          const listLink = document.createElement("a");
          listLink.href = `list.html?listName=${list.name}`;
          listLink.textContent = list.name;
          listItem.appendChild(listLink);
          listOfLists.appendChild(listItem);
        });
      }

      // Initial population of the list of lists
      populateListOfLists();
    </script>
  </body>
</html>
