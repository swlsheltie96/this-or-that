<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="style.css" />
    <link
      href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" type="text/css" href="grid.css" />
    <title>List</title>

    <script
      type="text/javascript"
      src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"
    ></script>
  </head>

  <body>
    <div class="home-small">
      <a href="https://elochamber.com/" class="flex align">
        <img
          class="elo-logo small"
          src="https://win98icons.alexmeub.com/icons/png/cardfile-1.png"
        />

        <h5 class="index-title">Elo Chamber</h5>
      </a>
    </div>
    <h1 id="listName"></h1>
    <div class="listTop wrapper box">
      <div class="listTop-inner form">
        <h2 id="listDescription"></h2>
        <h2 id="listAuthor"></h2>
        <h2 id="listNumVotes"></h2>
      </div>
      <div class="flex justify">
        <h2 id="listTimeLastVoted"></h2>

        <button id="voteButton" class="clickable">
          <a id="voteButtonA"><p>Vote!</p></a>
        </button>
      </div>
    </div>
    <hr />
    <div class="list-wrapper">
      <div class="gridType flex align">
        <div class="viewSelect flex">
          <button id="smallSquare" class="visualtab">▪</button>
          <button id="largeSquare" class="visualtab clicked">⏹</button>
        </div>
      </div>
      <div class="card-container-wrapper box">
        <div id="card-container" class="largeSquare"></div>

        <button id="editButton" class="clickable">
          <a id="editButtonA"><p>(Edit)</p></a>
        </button>
      </div>
    </div>

    <script src="api.js"></script>
    <script src="grid.js"></script>
  </body>
</html>
