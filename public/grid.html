<!DOCTYPE html>

    <link rel="stylesheet" type="text/css" href="style.css" />
    <link
      href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator.min.css"
      rel="stylesheet"
    />
    <title>List</title>
    <style>
      #card-container {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .card {
        flex: 1 0 20%;
        border: 1px solid #ccc;
        padding: 10px;
      }
      .card img {
        width: 100%;
        max-width: unset;
        aspect-ratio: 1;
      }
      .card .index {
        padding: 5px;
        text-align: center;
        width: 1em;
        height: 1em;
        background-color: black;
        color: white;
        border-radius: 100px;
      }
    </style>

    <script
      type="text/javascript"
      src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"
    ></script>
  </head>

    <div class="headerContent">
      <a id="backButton" href="index.html">←</a>

    <script src="api.js"></script>
