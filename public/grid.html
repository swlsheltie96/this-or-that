<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="style.css" />
    <link
      href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator.min.css"
      rel="stylesheet"
    />
    <title>List</title>
    <style></style>

    <script
      type="text/javascript"
      src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"
    ></script>
  </head>
  <body>
    <div class="flex-justify top">
      <a href="https://elochamber.com/">
        <img
          class="elo-logo"
          src="https://win98icons.alexmeub.com/icons/png/cardfile-1.png"
        />
      </a>
      <h1 class="index-title">Elo Chamber</h1>
    </div>
    <div class="top">
      <div class="flex-justify listTop">
        <h1 id="listName"></h1>

        <a id="voteButton" class="clickable"><b>Vote!</b></a>
      </div>
      <h2 id="listDescription"></h2>
    </div>

    <div class="gridType flex-justify">
      <div class="viewSelect">
        <button id="smallSquare" class="clickable">▪</button>
        <button id="largeSquare" class="clickable clicked">⏹</button>
      </div>

      <a id="viewButton" class="clickable">(Edit)</a>
    </div>
    <div id="card-container" class="largeSquare"></div>

    <script src="api.js"></script>
    <script src="grid.js"></script>
  </body>
</html>
